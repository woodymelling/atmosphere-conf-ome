date: '2026-03-26'
performances:
  Room 2301:
    - title: "OAuth Masterclass"
      artist: ngerakines.me
      time: 9:30 AM
      endTime: 12:30 PM
    - title: "Abstracting the Appview Workshop"
      artist: chadtmiller.com
      time: 2:00 PM
      endTime: 4:00 PM
      description: >-
        Chad Miller explores AppViews—their fundamentals, operational mechanisms, and implementation
        approaches. The workshop examines how tools like quickslice simplify complexity, allowing
        developers to concentrate on Lexicons and user experience. Additional tools covered include
        Tap, AIP, and Constellation, spanning approaches from getting started all the way to production.
    - title: "Verified Human Users, game changer in the atmosphere"
      artist: jan.wsocial.eu
      time: 4:00 PM
      endTime: 5:00 PM
      description: >-
        Jan Lindblad addresses the proliferation of automated accounts across social platforms,
        arguing that bots have compromised authentic social interaction. He proposes W Social's
        solution: verified human identity through passport verification using a privacy-preserving
        architecture with a "user information firewall." This dual-layer system creates asymmetric
        access—one component knows user identities but is blind to account assignments, while the
        other understands the full social graph without revealing personal identity details.

