  Performance Theatre:
    - title: "Hospicing social media: Personal archival practices"
      artist: dcwalker.ca
      time: 10:30 AM
      endTime: 12:30 PM
    - title: "What futures can we build together?"
      artists: [offline.arushibandi.com, ivansigal.bsky.social, christian.bsky.social]
      time: 2:00 PM
      endTime: 4:00 PM
      description: >-
        This cross-disciplinary workshop explores new social modalities that can be built with the
        affordances of ATProtocol. Participants will collaborate to envision innovative possibilities
        for communal engagement on the protocol, emphasizing conceptual design rather than technical
        implementation. The session aims to expand attendees' understanding of what it looks like to
        be online through ideation and co-design activities.
    - title: "Dive into user research with ATProto builders/users"
      artists: [tessa.germnetwork.com, tynanpurdy.com]
      time: 4:30 PM
      endTime: 6:30 PM
      description: >-
        This workshop invites ecosystem participants to conduct research on their own initiatives
        while observing emerging products. The organizers note that recent talks about onboarding in
        the Atmosphere have drawn calls for more user research. Rather than positioning themselves as
        authorities, the facilitators describe themselves as fellow builders making space for the
        community to learn from each other.

